<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>QuoteMySmile sign-in code</title>
  </head>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#F5F1E8; padding:32px; color:#2A2520;">
    <div style="max-width:480px; margin:0 auto; background:#FFFFFF; border-radius:16px; padding:32px;">
      <h1 style="font-size:18px; letter-spacing:2px; text-transform:uppercase; color:#5FA89B; margin:0 0 8px;">QuoteMySmile</h1>
      <p style="font-size:14px; color:#6E6457; margin:0 0 24px;">Your sign-in code</p>
      <p style="font-size:42px; font-weight:700; letter-spacing:8px; color:#2A2520; margin:0 0 24px;">{{ .Token }}</p>
      <p style="font-size:13px; color:#6E6457; line-height:1.5;">
        Enter this 6-digit code in the app to finish signing in. It expires in 5 minutes.
      </p>
      <p style="font-size:11px; color:#9A9088; margin-top:32px;">
        If you didn't request this code, you can safely ignore this email.
      </p>
    </div>
  </body>
</html>
