<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32">
  <!-- QuoteMySmile favicon: white smile with hook tips on each end, mint gradient background -->
  <defs>
    <linearGradient id="qms-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A8C82"/>
      <stop offset="55%" stop-color="#5FA89B"/>
      <stop offset="100%" stop-color="#A9CFC0"/>
    </linearGradient>
    <radialGradient id="qms-shine" cx="25%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#qms-bg)"/>
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#qms-shine)"/>

  <!-- Sparkle dot (top-right) -->
  <circle cx="54" cy="11" r="2.4" fill="#ffffff" opacity="0.85"/>

  <!-- White smile arc — bold, rounded ends -->
  <path d="M 14 28 Q 32 50 50 28"
        fill="none"
        stroke="#ffffff"
        stroke-width="6"
        stroke-linecap="round"/>

  <!-- LEFT hook — small curve flicking up from the left end of the smile -->
  <path d="M 14 28 Q 11 23 14 19"
        fill="none"
        stroke="#ffffff"
        stroke-width="5"
        stroke-linecap="round"/>

  <!-- RIGHT hook — small curve flicking up from the right end of the smile -->
  <path d="M 50 28 Q 53 23 50 19"
        fill="none"
        stroke="#ffffff"
        stroke-width="5"
        stroke-linecap="round"/>
</svg>
