<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32">
  <defs>
    <linearGradient id="qms-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A8C82"/>
      <stop offset="55%" stop-color="#5FA89B"/>
      <stop offset="100%" stop-color="#A9CFC0"/>
    </linearGradient>
    <radialGradient id="qms-shine" cx="25%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#qms-bg)"/>
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#qms-shine)"/>
  <circle cx="55" cy="10" r="2.3" fill="#ffffff" opacity="0.85"/>

  <!--
    Bowl: bold curved stroke from left base to right base (centre of each hook).
  -->
  <path d="M 14 30 Q 32 50 50 30"
        fill="none"
        stroke="#ffffff"
        stroke-width="5"
        stroke-linecap="round"/>

  <!--
    LEFT hook: filled curl that flicks UP and out from the smile's left base.
    Starts at smile end (14,30), sweeps up-and-left, points to tip, returns.
  -->
  <path d="
    M 14 30
    Q 6 24 8 14
    Q 13 20 17 22
    Q 18 27 14 30
    Z"
    fill="#ffffff"/>

  <!--
    RIGHT hook: mirrored.
  -->
  <path d="
    M 50 30
    Q 58 24 56 14
    Q 51 20 47 22
    Q 46 27 50 30
    Z"
    fill="#ffffff"/>
</svg>
