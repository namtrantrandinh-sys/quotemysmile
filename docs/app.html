    <!--
      Smart redirect. UA-detects iOS / Android and forwards to the store.
      Falls back to the rendered page below for desktops + reviewers.
      Update the two REPLACE_ URLs once you have the live store listings.
    -->
    <script>
      (function () {
        var APPSTORE_URL = "https://apps.apple.com/au/app/REPLACE_WITH_APP_ID";
        var PLAYSTORE_URL = "https://play.google.com/store/apps/details?id=com.quotemysmile.app";
        var ua = navigator.userAgent || "";
        if (/android/i.test(ua)) {
          window.location.replace(PLAYSTORE_URL);
        } else if (/iphone|ipad|ipod/i.test(ua)) {
          window.location.replace(APPSTORE_URL);
        }
      })();
    </script>
