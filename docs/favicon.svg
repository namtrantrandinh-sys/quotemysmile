<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- QuoteMySmile favicon: editorial smile curve in mint on bone -->
  <rect x="0" y="0" width="32" height="32" rx="6" ry="6" fill="#F5F1E8"/>
  <!-- Soft sparkle dot (top-right) for "your dream smile" hint -->
  <circle cx="24" cy="9" r="1.3" fill="#A9CFC0" opacity="0.55"/>
  <!-- Smile curve: confident arc, rounded ends, slightly upturned -->
  <path d="M 7.5 13.5 Q 16 24.5 24.5 13.5"
        fill="none"
        stroke="#A9CFC0"
        stroke-width="3"
        stroke-linecap="round"/>
  <!-- Subtle inner highlight for depth -->
  <path d="M 9.5 14.5 Q 16 22 22.5 14.5"
        fill="none"
        stroke="#F5F1E8"
        stroke-width="0.6"
        stroke-linecap="round"
        opacity="0.5"/>
</svg>
