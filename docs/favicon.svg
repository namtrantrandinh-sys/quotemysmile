<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32">
  <!-- QuoteMySmile favicon: white Amazon-style smile + filled triangular arrowheads at each end -->
  <defs>
    <linearGradient id="qms-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A8C82"/>
      <stop offset="55%" stop-color="#5FA89B"/>
      <stop offset="100%" stop-color="#A9CFC0"/>
    </linearGradient>
    <radialGradient id="qms-shine" cx="25%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#qms-bg)"/>
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#qms-shine)"/>

  <!-- Sparkle dot top-right -->
  <circle cx="54" cy="11" r="2.4" fill="#ffffff" opacity="0.85"/>

  <!-- Bold white smile arc — flat ends so arrowheads attach cleanly -->
  <path d="M 14 28 Q 32 50 50 28"
        fill="none"
        stroke="#ffffff"
        stroke-width="6"
        stroke-linecap="butt"/>

  <!--
    LEFT arrowhead — sharp triangle pointing up-and-out from left end of smile.
    Tip is at (5, 14). Base touches smile end (14, 28) and inner-barb (17, 26).
  -->
  <path d="M 5 14 L 17 26 L 14 31 Z"
        fill="#ffffff"/>

  <!--
    RIGHT arrowhead — mirrored: tip at (59, 14), base at (50, 31), inner-barb (47, 26).
  -->
  <path d="M 59 14 L 47 26 L 50 31 Z"
        fill="#ffffff"/>
</svg>
