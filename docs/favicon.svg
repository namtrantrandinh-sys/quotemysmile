<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- QuoteMySmile favicon: white smile arc on teal gradient -->
  <defs>
    <linearGradient id="qms-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A8C82"/>
      <stop offset="55%" stop-color="#5FA89B"/>
      <stop offset="100%" stop-color="#A9CFC0"/>
    </linearGradient>
    <radialGradient id="qms-shine" cx="22%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Rounded square so it works inside Safari/iOS rounded mask AND square Android maskable -->
  <rect x="0" y="0" width="32" height="32" rx="7" ry="7" fill="url(#qms-bg)"/>
  <rect x="0" y="0" width="32" height="32" rx="7" ry="7" fill="url(#qms-shine)"/>
  <!-- Sparkle dot (top-right) -->
  <circle cx="24.5" cy="8.5" r="1.4" fill="#ffffff" opacity="0.85"/>
  <!-- Smile curve: confident upturned arc, rounded caps -->
  <path d="M 7 14 Q 16 26 25 14"
        fill="none"
        stroke="#ffffff"
        stroke-width="3"
        stroke-linecap="round"/>
  <!-- Subtle inner highlight for depth -->
  <path d="M 9 14.8 Q 16 23 23 14.8"
        fill="none"
        stroke="#ffffff"
        stroke-width="0.5"
        stroke-linecap="round"
        opacity="0.55"/>
</svg>
